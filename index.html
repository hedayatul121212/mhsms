<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram - MHSMS</title>
    <style>
        /* 🎨 Telegram Dark Mode Global Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #17212b; color: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; overflow: hidden; }
        
        .admin-notice-bar { width: 100%; max-width: 450px; background: #2b5278; color: #fff; padding: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; border-bottom: 1px solid #101921; z-index: 10; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; background: #17212b; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* 🔐 Auth Screen */
        .auth-container { width: 100%; max-width: 450px; height: 100vh; background: #17212b; padding: 40px 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .auth-container .tg-logo { font-size: 4rem; margin-bottom: 20px; color: #2481cc; }
        .auth-container h2 { margin-bottom: 10px; color: #fff; font-size: 1.6rem; font-weight: 500; }
        .auth-container p { color: #7f91a4; font-size: 0.9rem; margin-bottom: 30px; }
        .auth-container input { width: 100%; padding: 14px; margin: 10px 0; background: #24303f; border: 1px solid #2f3e4e; border-radius: 10px; outline: none; color: white; font-size: 1rem; }
        .auth-container input:focus { border-color: #2481cc; }
        .auth-container button { width: 100%; padding: 14px; background: #2481cc; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; }
        
        /* 🔝 Telegram Home Header */
        .tg-header { background: #233140; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #101921; }
        .tg-header-left { display: flex; align-items: center; gap: 15px; }
        .tg-menu-icon { font-size: 1.4rem; cursor: pointer; color: #6c7883; }
        .tg-title { font-size: 1.25rem; font-weight: 500; color: #fff; }
        .tg-search-bar { background: #17212b; margin: 8px 12px; padding: 10px 15px; border-radius: 10px; display: flex; align-items: center; }
        .tg-search-bar input { background: none; border: none; outline: none; color: white; width: 100%; font-size: 0.95rem; }

        /* 👥 Chat List Main Frame */
        .friend-list { flex: 1; overflow-y: auto; list-style: none; background: #17212b; }
        .friend-item { padding: 12px 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #101921; }
        .friend-item:hover { background: #202b36; }
        
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #2481cc; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.15rem; text-transform: uppercase; }
        .avatar.group { background: #517da2; }
        
        .chat-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .chat-info-top { display: flex; justify-content: space-between; align-items: center; }
        .chat-name { font-weight: 500; color: #fff; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 0.75rem; color: #6c7883; }
        .chat-preview { font-size: 0.9rem; color: #7f91a4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .group-chat-item { background: #1c2733; }

        /* 💬 Telegram Style Chat Window */
        .chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0e1621; display: flex; flex-direction: column; z-index: 100; transform: translateX(100%); transition: transform 0.22s ease-in-out; }
        .chat-window.open { transform: translateX(0); }
        
        .chat-win-header { background: #17212b; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #111a22; }
        .chat-win-left { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; overflow: hidden; }
        .back-btn { font-size: 1.4rem; color: #fff; background: none; border: none; cursor: pointer; padding: 4px 8px; }
        .user-details { display: flex; flex-direction: column; overflow: hidden; }
        .user-details .chat-name { font-size: 1.05rem; font-weight: 500; }
        .user-status { font-size: 0.8rem; color: #7f91a4; margin-top: 1px; }
        
        .chat-win-actions { display: flex; align-items: center; gap: 16px; padding-right: 5px; }
        .call-btn { background: none; border: none; font-size: 1.25rem; cursor: pointer; color: #fff; }
        .menu-dots { font-size: 1.25rem; color: #fff; cursor: pointer; }

        .message-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #0e1621; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; opacity: 0.98; }
        
        .date-badge { align-self: center; background: rgba(30, 42, 54, 0.6); color: #fff; font-size: 0.8rem; padding: 4px 12px; border-radius: 12px; margin: 8px 0; font-weight: 400; }
        .message-wrapper { display: flex; flex-direction: column; width: 100%; }
        .message { padding: 9px 13px; border-radius: 12px; max-width: 75%; word-wrap: break-word; font-size: 0.95rem; line-height: 1.4; position: relative; display: flex; flex-direction: column; }
        
        .message.incoming { background: #182533; align-self: flex-start; color: #fff; border-bottom-left-radius: 3px; }
        .message.outgoing { background: #2b5278; align-self: flex-end; color: #fff; border-bottom-right-radius: 3px; }
        .msg-time-stamp { font-size: 0.68rem; color: #7f91a4; align-self: flex-end; margin-top: 4px; margin-left: 20px; }
        .msg-sender { font-size: 0.8rem; color: #517da2; font-weight: bold; margin-bottom: 3px; }

        /* 📌 Input Controls */
        .input-area { display: flex; padding: 8px 10px; background: #17212b; align-items: center; gap: 8px; border-top: 1px solid #111a22; }
        .input-wrap { flex: 1; background: #24303f; border-radius: 22px; display: flex; align-items: center; padding: 0 14px; gap: 10px; }
        .emoji-btn, .attach-btn { font-size: 1.3rem; color: #7f91a4; background: none; border: none; cursor: pointer; display: flex; align-items: center; }
        .input-wrap input { flex: 1; padding: 10px 0; background: none; border: none; outline: none; color: white; font-size: 0.95rem; }
        
        .mic-send-btn { width: 40px; height: 40px; background: #2481cc; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; color: white; font-size: 1.2rem; cursor: pointer; }

        /* 📞 Call Screens */
        .call-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(14, 22, 33, 0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: white; }
        .call-avatar { width: 110px; height: 110px; background: #2481cc; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 3rem; margin-bottom: 20px; }
        .call-status { font-size: 1.1rem; color: #7f91a4; margin-bottom: 40px; }
        .call-buttons { display: flex; gap: 30px; }
        .btn-call { border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; }
        .btn-accept { background: #28a745; }
        .btn-decline { background: #dc3545; }
        .video-container { display: flex; gap: 10px; margin-top: 20px; width: 90%; max-width: 400px; justify-content: center; }
        video { width: 48%; max-height: 180px; background: #000; border-radius: 8px; transform: scaleX(-1); border: 1px solid #2481cc; }

        .add-friend-bar { background: #233140; padding: 10px 15px; display: flex; gap: 10px; border-bottom: 1px solid #101921; }
        .add-friend-bar input { flex: 1; padding: 8px 12px; background: #17212b; border: none; border-radius: 6px; color: white; outline: none; }
        .add-friend-bar button { padding: 8px 15px; background: #2481cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="adminNotice" class="admin-notice-bar hidden">📢 নোটিশ...</div>

<div id="authScreen" class="auth-container">
    <div class="tg-logo">✈️</div>
    <h2>Telegram - MHSMS</h2>
    <p>ইউজারনেম দিয়ে সাইন-ইন করুন</p>
    <input type="text" id="usernameInput" placeholder="ইউজারনেম">
    <input type="password" id="passwordInput" placeholder="পাসওয়ার্ড">
    <button id="authBtn" onclick="handleAuth()">লগইন / রেজিস্টার</button>
</div>

<div id="appScreen" class="app-container hidden">
    <div class="tg-header">
        <div class="tg-header-left">
            <div class="tg-menu-icon">☰</div>
            <div class="tg-title">Telegram</div>
        </div>
    </div>

    <div class="add-friend-bar">
        <input type="text" id="friendUsername" placeholder="বন্ধুর ইউজারনেম...">
        <button onclick="addFriend()">অ্যাড</button>
    </div>

    <div class="tg-search-bar"><input type="text" placeholder="Search Chats"></div>

    <ul class="friend-list" id="friendList"></ul>
    
    <div id="groupChatSidebarBtn" class="friend-item group-chat-item hidden" onclick="openGroupChat()">
        <div class="avatar group">🌍</div>
        <div class="chat-info">
            <div class="chat-info-top"><span class="chat-name">গ্লোবাল গ্রুপ চ্যাটরুম</span><span class="chat-time">Live</span></div>
            <span class="chat-preview">গ্রুপে চ্যাট করতে এখানে ক্লিক করুন...</span>
        </div>
    </div>

    <div id="chatWindow" class="chat-window">
        <div class="chat-win-header">
            <div class="chat-win-left" onclick="closeChatWindow()">
                <button class="back-btn">←</button>
                <div class="avatar" id="activeChatAvatar" style="width:40px; height:40px; font-size:1.1rem;">M</div>
                <div class="user-details">
                    <span class="chat-name" id="currentChatUser">MH MH</span>
                    <span class="user-status" id="currentUserStatus">online</span>
                </div>
            </div>
            <div class="chat-win-actions hidden" id="chatActions">
                <button id="audioCallBtn" class="call-btn" onclick="makeCall('Audio')">📞</button>
                <button id="videoCallBtn" class="call-btn" onclick="makeCall('Video')">📹</button>
                <span class="menu-dots">⋮</span>
            </div>
        </div>
        
        <div class="message-area" id="messageArea"></div>
        
        <div class="input-area">
            <div class="input-wrap">
                <button class="emoji-btn">😊</button>
                <input type="text" id="messageInput" placeholder="Message" autocomplete="off" oninput="toggleInputIcon()">
                <button class="attach-btn">📎</button>
            </div>
            <button id="micSendBtn" class="mic-send-btn" onclick="sendMessage()">🎙️</button>
        </div>
    </div>
</div>

<div id="callOverlay" class="call-overlay hidden">
    <div class="call-avatar" id="callAvatar">👤</div>
    <h2 id="callUserName">User</h2>
    <div class="call-status" id="callTypeStatus">Calling...</div>
    <div class="call-buttons">
        <button id="btnAcceptCall" class="btn-call btn-accept hidden" onclick="answerCall()">📞</button>
        <button class="btn-call btn-decline" onclick="hangUpCall()">❌</button>
    </div>
    <div id="videoStreams" class="video-container hidden">
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
</div>

<audio id="smsRingtone" src="618f3287-new_facebook_ringtone_7.m4a" preload="auto"></audio>
<audio id="ringtoneSound" loop src="World_Best_Instrumental_Ringtone___Romantic_Instrumental_Ringtone___Tujh_Bin_Instrumental_Ringtone.mp3" preload="auto"></audio>
<audio id="ringingSound" loop src="https://assets.mixkit.co/active_storage/sfx/1643/1643-84.wav" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1p-aoUP7QUEFqGCL5j7YE5RWnV7Uwd0A",
        authDomain: "hedayatul-4487e.firebaseapp.com",
        projectId: "hedayatul-4487e",
        storageBucket: "hedayatul-4487e.firebasestorage.app",
        messagingSenderId: "120479258973",
        appId: "1:120479258973:web:3280d2794466b1537030b4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;
    let activeChatFriend = null;
    let isGroupChatActive = false;
    let unsubscribeChat = null;
    let unsubscribeCalls = null;
    let isInitialLoad = true;
    let lastRenderedDate = null;
    
    let localStream = null;
    let remoteStream = null;
    let peerConnection = null;
    let currentCallId = null;

    const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    function toggleInputIcon() {
        const input = document.getElementById('messageInput');
        const btn = document.getElementById('micSendBtn');
        if(input.value.trim().length > 0) {
            btn.innerText = "🚀";
        } else {
            btn.innerText = "🎙️";
        }
    }

    function listenForAdminUpdates() {
        db.collection("settings").doc("admin_controls").onSnapshot(doc => {
            if(doc.exists) {
                const data = doc.data();
                const noticeBar = document.getElementById("adminNotice");
                if(data.noticeText && data.noticeText.trim() !== "") {
                    noticeBar.innerText = "📢 " + data.noticeText;
                    noticeBar.classList.remove("hidden");
                } else { noticeBar.classList.add("hidden"); }

                const groupBtn = document.getElementById("groupChatSidebarBtn");
                if(data.enableGroupChat === true) groupBtn.classList.remove("hidden");
                else { groupBtn.classList.add("hidden"); if(isGroupChatActive) closeChatWindow(); }
            }
        });
    }

    async function handleAuth() {
        const username = document.getElementById('usernameInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value.trim();
        if(!username || password.length < 6) { alert("সঠিক ইউজারনেম ও পাসওয়ার্ড দিন।"); return; }
        try {
            const userRef = db.collection("users").doc(username);
            const doc = await userRef.get();
            if (doc.exists && doc.data().password === password) { loginSuccess(username); } 
            else if (!doc.exists) {
                await userRef.set({ username, password, friends: [] });
                loginSuccess(username);
            } else { alert("ভুল পাসওয়ার্ড!"); }
        } catch (e) { alert("এরর: " + e.message); }
    }

    function loginSuccess(username) {
        currentUser = username;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        listenForAdminUpdates();
        loadFriends();
        listenForIncomingCalls();
        listenForAllIncomingMessages();
    }

    function listenForAllIncomingMessages() {
        db.collectionGroup("messages").orderBy("timestamp", "desc").limit(1).onSnapshot(snapshot => {
            if (isInitialLoad) { isInitialLoad = false; return; }
            snapshot.docChanges().forEach(change => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    if (data.sender !== currentUser) {
                        const ring = document.getElementById('smsRingtone');
                        if (ring) {
                            ring.currentTime = 0;
                            ring.play().catch(e => console.log("User interaction required for audio:", e));
                        }
                        
                        if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
                            new Notification(`Telegram: ${data.sender}`, { body: data.text });
                        }
                    }
                }
            });
        }, e => console.log("Listening to updates..."));
    }

    function loadFriends() {
        db.collection("users").doc(currentUser).onSnapshot((doc) => {
            const list = document.getElementById('friendList'); list.innerHTML = '';
            if(!doc.exists) return;
            (doc.data().friends || []).forEach(friend => {
                const li = document.createElement('li'); li.classList.add('friend-item');
                const letter = friend.charAt(0);
                li.innerHTML = `
                    <div class="avatar">${letter}</div>
                    <div class="chat-info">
                        <div class="chat-info-top"><span class="chat-name">${friend}</span><span class="chat-time">Tue</span></div>
                        <span class="chat-preview">Tap to view chat conversation</span>
                    </div>
                `;
                li.onclick = () => { 
                    isGroupChatActive = false; activeChatFriend = friend; 
                    document.getElementById('currentChatUser').innerText = friend; 
                    document.getElementById('currentUserStatus').innerText = "online";
                    document.getElementById('activeChatAvatar').innerText = letter;
                    document.getElementById('activeChatAvatar').classList.remove('group');
                    document.getElementById('chatActions').classList.remove('hidden');
                    document.getElementById('chatWindow').classList.add('open');
                    loadMessages(); 
                };
                list.appendChild(li);
            });
        });
    }

    function openGroupChat() {
        isGroupChatActive = true; activeChatFriend = null;
        document.getElementById('currentChatUser').innerText = "গ্লোবাল গ্রুপ চ্যাটরুম";
        document.getElementById('currentUserStatus').innerText = "global open room";
        document.getElementById('activeChatAvatar').innerText = "🌍";
        document.getElementById('activeChatAvatar').classList.add('group');
        document.getElementById('chatActions').classList.add('hidden');
        document.getElementById('chatWindow').classList.add('open');
        loadMessages();
    }

    function closeChatWindow() {
        document.getElementById('chatWindow').classList.remove('open');
        isGroupChatActive = false; activeChatFriend = null;
        if (unsubscribeChat) unsubscribeChat();
    }

    function loadMessages() {
        if (unsubscribeChat) unsubscribeChat();
        lastRenderedDate = null;
        let messagesRef = isGroupChatActive ? 
            db.collection("group_chats").doc("global_room").collection("messages").orderBy("timestamp", "asc") :
            db.collection("chats").doc([currentUser, activeChatFriend].sort().join('_')).collection("messages").orderBy("timestamp", "asc");

        unsubscribeChat = messagesRef.onSnapshot(snapshot => {
            const area = document.getElementById('messageArea'); area.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                
                const msgDateString = new Date(data.timestamp).toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
                if(msgDateString !== lastRenderedDate) {
                    const dateBadge = document.createElement('div');
                    dateBadge.classList.add('date-badge');
                    dateBadge.innerText = msgDateString;
                    area.appendChild(dateBadge);
                    lastRenderedDate = msgDateString;
                }

                const wrapper = document.createElement('div'); wrapper.classList.add('message-wrapper');
                const msgDiv = document.createElement('div'); msgDiv.classList.add('message', data.sender === currentUser ? 'outgoing' : 'incoming');
                
                let senderNameHtml = (isGroupChatActive && data.sender !== currentUser) ? `<span class="msg-sender">@${data.sender}</span>` : '';
                const timeStr = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                msgDiv.innerHTML = `${senderNameHtml}<div>${data.text}</div><span class="msg-time-stamp">${timeStr} ${data.sender === currentUser ? '✓✓' : ''}</span>`;
                wrapper.appendChild(msgDiv); area.appendChild(wrapper);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput'); const text = input.value.trim();
        if (!text) return;
        const msgData = { sender: currentUser, text, timestamp: new Date().getTime() };
        
        if(isGroupChatActive) await db.collection("group_chats").doc("global_room").collection("messages").add(msgData);
        else if(activeChatFriend) await db.collection("chats").doc([currentUser, activeChatFriend].sort().join('_')).collection("messages").add(msgData);
        
        input.value = '';
        toggleInputIcon();
    }

    // 📞 Call Management (ইনকামিং কলের জন্য আপনার দেওয়া Tujh Bin রিংটোন সেটআপ)
    async function makeCall(type) {
        if(!activeChatFriend) return;
        currentCallId = currentUser + "_" + Date.now();
        if(localStream) localStream.getTracks().forEach(t => t.stop());

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'Video' });
            document.getElementById('videoStreams').classList.remove('hidden');
            document.getElementById('localVideo').srcObject = localStream;
        } catch (e) { alert("ক্যামেরা/মাইক্রোফোন পারমিশন দিন!"); return; }

        showCallOverlay(activeChatFriend, `${type} Call - Ringing...`, false);
        document.getElementById('ringingSound').play().catch(e => console.log(e));

        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        remoteStream = new MediaStream(); document.getElementById('remoteVideo').srcObject = remoteStream;
        peerConnection.ontrack = ev => ev.streams[0].getTracks().forEach(tr => remoteStream.addTrack(tr));

        const callDoc = db.collection("calls").doc(currentCallId);
        peerConnection.onicecandidate = ev => ev.candidate && callDoc.collection("callerCandidates").add(ev.candidate.toJSON());

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        await callDoc.set({ caller: currentUser, receiver: activeChatFriend, type: type, status: "ringing", offer: { type: offer.type, sdp: offer.sdp } });

        callDoc.onSnapshot(snap => { const d = snap.data(); if (d && d.answer && !peerConnection.currentRemoteDescription) peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer)); });
        callDoc.collection("receiverCandidates").onSnapshot(snap => snap.docChanges().forEach(c => c.type === 'added' && peerConnection.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        listenToCallStatus();
    }

    // 🔔 ওপার থেকে কল আসলে আপনার মিউজিকটি এখানে বাজবে
    function listenForIncomingCalls() {
        db.collection("calls").where("receiver", "==", currentUser).where("status", "==", "ringing").onSnapshot(snap => {
            snap.forEach(doc => {
                if (currentCallId) return; 
                const d = doc.data(); currentCallId = doc.id;
                showCallOverlay(d.caller, `Incoming ${d.type} Call...`, true);
                
                // 🎵 আপনার আপলোড করা Tujh Bin ইনস্ট্রুমেন্টাল রিংটোন বাজবে লুপ আকারে
                const callMusic = document.getElementById('ringtoneSound');
                if (callMusic) {
                    callMusic.currentTime = 0;
                    callMusic.play().catch(e => console.log("Audio play blocked until user tap:", e));
                }
            });
        });
    }

    async function answerCall() {
        const callDoc = db.collection("calls").doc(currentCallId); const d = (await callDoc.get()).data();
        document.getElementById('ringtoneSound').pause(); document.getElementById('ringtoneSound').currentTime = 0;
        if(localStream) localStream.getTracks().forEach(t => t.stop());

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: d.type === 'Video' });
            document.getElementById('videoStreams').classList.remove('hidden'); document.getElementById('localVideo').srcObject = localStream;
        } catch (e) { alert("মিডিয়া ডিভাইস অন করা যায়নি!"); hangUpCall(); return; }

        document.getElementById('callTypeStatus').innerText = "Connecting...";
        document.getElementById('btnAcceptCall').classList.add('hidden');

        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        remoteStream = new MediaStream(); document.getElementById('remoteVideo').srcObject = remoteStream;
        peerConnection.ontrack = ev => ev.streams[0].getTracks().forEach(tr => remoteStream.addTrack(tr));

        peerConnection.onicecandidate = ev => ev.candidate && callDoc.collection("receiverCandidates").add(ev.candidate.toJSON());
        await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
        const ans = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(ans);

        await callDoc.update({ status: "accepted", answer: { type: ans.type, sdp: ans.sdp } });
        callDoc.collection("callerCandidates").onSnapshot(snap => snap.docChanges().forEach(c => c.type === 'added' && peerConnection.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        listenToCallStatus();
    }

    function listenToCallStatus() {
        if (unsubscribeCalls) unsubscribeCalls();
        unsubscribeCalls = db.collection("calls").doc(currentCallId).onSnapshot(doc => {
            if(!doc.exists) { cleanUpCallUI(); return; }
            if(doc.data().status === "accepted") { document.getElementById('ringingSound').pause(); document.getElementById('ringtoneSound').pause(); document.getElementById('callTypeStatus').innerText = "Connected 🎙️"; }
            else if(doc.data().status === "ended") cleanUpCallUI();
        });
    }

    async function hangUpCall() {
        if(currentCallId) { try { await db.collection("calls").doc(currentCallId).update({ status: "ended" }); await db.collection("calls").doc(currentCallId).delete(); } catch(e){} }
        cleanUpCallUI();
    }

    function showCallOverlay(name, status, isIncoming) {
        document.getElementById('callUserName').innerText = name; document.getElementById('callTypeStatus').innerText = status;
        document.getElementById('callOverlay').classList.remove('hidden'); if(isIncoming) document.getElementById('btnAcceptCall').classList.remove('hidden');
    }

    function cleanUpCallUI() {
        document.getElementById('callOverlay').classList.add('hidden'); document.getElementById('btnAcceptCall').classList.add('hidden'); document.getElementById('videoStreams').classList.add('hidden');
        document.getElementById('ringtoneSound').pause(); document.getElementById('ringingSound').pause();
        if(peerConnection) { peerConnection.close(); peerConnection = null; }
        if(localStream) { localStream.getTracks().forEach(tr => tr.stop()); localStream = null; }
        currentCallId = null;
    }

    async function addFriend() { const f = document.getElementById('friendUsername').value.trim().toLowerCase(); if(!f || f === currentUser) return; await db.collection("users").doc(currentUser).update({ friends: firebase.firestore.FieldValue.arrayUnion(f) }); await db.collection("users").doc(f).update({ friends: firebase.firestore.FieldValue.arrayUnion(currentUser) }); alert("যুক্ত হয়েছে!"); document.getElementById('friendUsername').value = ''; }
    document.getElementById('messageInput').addEventListener('keypress', e => e.key === 'Enter' && sendMessage());
    if ("Notification" in window) Notification.requestPermission();
</script>
</body>
