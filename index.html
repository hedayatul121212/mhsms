<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHSMS - লাইভ ভয়েস ও ভিডিও কলিং</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .app-container { width: 100%; max-width: 950px; height: 85vh; background: rgba(255, 255, 255, 0.9); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; overflow: hidden; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        
        /* Auth Screen */
        .auth-container { width: 100%; max-width: 400px; background: white; padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 2px solid #ffb7b2; }
        .auth-container h2 { margin-bottom: 15px; color: #ff6b6b; font-size: 1.8rem; }
        .auth-container input { width: 100%; padding: 12px 20px; margin: 8px 0; border: 1px solid #ffccd5; border-radius: 25px; outline: none; transition: 0.3s; font-size: 0.9rem; }
        .auth-container input:focus { border-color: #ff6b6b; box-shadow: 0 0 8px rgba(255,107,107,0.2); }
        
        /* File Upload Style */
        .file-upload-wrapper { margin: 8px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .file-upload-btn { background: #fff0f3; border: 1px dashed #ff758c; padding: 10px 20px; border-radius: 25px; color: #ff4d6d; cursor: pointer; font-size: 0.9rem; font-weight: bold; width: 100%; transition: 0.3s; }
        .file-upload-btn:hover { background: #ffe5ec; }
        #uploadStatus { font-size: 0.8rem; color: #28a745; margin-top: 2px; font-weight: bold; }

        .auth-container button.main-btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #ff6b6b, #ff8e8e); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; box-shadow: 0 4px 10px rgba(255,107,107,0.3); }
        .auth-note { font-size: 0.75rem; color: #888; margin-top: 5px; display: block; }

        /* Avatar Global Style */
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #ff758c; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.1rem; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Sidebar */
        .sidebar { width: 30%; border-right: 1px solid #ffe5ec; display: flex; flex-direction: column; background: #fff5f7; }
        .sidebar-header { padding: 20px 15px; background: linear-gradient(45deg, #ff758c, #ff7eb3); color: white; font-weight: bold; font-size: 1.3rem; text-align: center; position: relative; overflow: hidden; }
        .animated-logo { display: inline-block; font-family: 'Arial Black', sans-serif; letter-spacing: 2px; text-shadow: 0 0 8px rgba(255, 255, 255, 0.6); animation: moveAround 4s ease-in-out infinite alternate, glowEffect 1.5s ease-in-out infinite alternate; }

        @keyframes moveAround { 0% { transform: translate(0, 0); } 50% { transform: translate(6px, -3px); } 100% { transform: translate(-6px, 3px); } }
        @keyframes glowEffect { from { text-shadow: 0 0 4px #fff, 0 0 10px #ff4d6d, 0 0 20px #ff4d6d; } to { text-shadow: 0 0 8px #fff, 0 0 18px #ffb7b2, 0 0 35px #ff758c; } }

        .add-friend-box { padding: 12px; display: flex; gap: 8px; background: #fff; border-bottom: 1px solid #ffe5ec; }
        .add-friend-box input { flex: 1; padding: 10px; border: 1px solid #ffccd5; border-radius: 20px; outline: none; padding-left: 15px; }
        .add-friend-box button { padding: 0 15px; background: #ff4d6d; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .friend-list { flex: 1; overflow-y: auto; list-style: none; }
        .friend-item { padding: 12px; border-bottom: 1px solid #ffe5ec; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 500; color: #4a4a4a; }
        .friend-item:hover { background: #ffe5ec; }
        .friend-item.active { background: #ffccd5; color: #ff0040; font-weight: bold; border-left: 5px solid #ff4d6d; }
        .friend-info { flex: 1; display: flex; flex-direction: column; }

        /* 🚪 লগআউট বাটন ডিজাইন */
        .sidebar-footer { padding: 15px; background: #fff; border-top: 1px solid #ffe5ec; text-align: center; }
        .logout-btn { width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .logout-btn:hover { background: #bd2130; box-shadow: 0 3px 8px rgba(220,53,69,0.3); }

        /* Chat Area */
        .chat-area { width: 70%; display: flex; flex-direction: column; background: #fffbfb; position: relative; }
        .chat-header { padding: 12px 15px; background: #fff0f3; border-bottom: 1px solid #ffe5ec; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .chat-header-userinfo { flex: 1; display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1rem; color: #ff4d6d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-actions-container { display: flex; align-items: center; gap: 15px; z-index: 10; }
        .call-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; transition: 0.2s; padding: 4px 8px; border-radius: 5px; }
        .call-btn:hover { background: rgba(255, 117, 140, 0.15); transform: scale(1.1); }
        
        .whatsapp-support-btn { display: flex; align-items: center; gap: 4px; background: #25D366; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; text-decoration: none; font-weight: bold; }

        .message-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png'); }
        .message-wrapper { display: flex; flex-direction: column; width: 100%; position: relative; margin-bottom: 5px; }
        .message-container { display: flex; align-items: center; width: 100%; position: relative; transition: transform 0.2s ease; user-select: none; }
        .message { padding: 12px 16px; border-radius: 20px; max-width: 65%; word-wrap: break-word; font-size: 0.95rem; position: relative; }
        .message.incoming { background: #f1f3f5; align-self: flex-start !important; border-bottom-left-radius: 5px; color: #333; }
        .message.outgoing { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; align-self: flex-end !important; border-bottom-right-radius: 5px; }
        .msg-time { font-size: 0.7rem; color: #a1a1a1; margin-top: 4px; display: block; }

        .input-area { display: flex; padding: 15px; border-top: 1px solid #ffe5ec; background: #fff0f3; }
        .input-area input { flex: 1; padding: 14px 20px; border: 1px solid #ffccd5; border-radius: 30px; outline: none; font-size: 0.95rem; }
        .input-area button { background: linear-gradient(45deg, #ff758c, #ff7eb3); color: white; border: none; padding: 0 25px; margin-left: 10px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        /* 📞 রিয়েল-টাইম কলিং স্ক্রিন ওভারলে */
        .call-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: white; text-align: center; padding: 20px; }
        .call-avatar-large { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; background: #ff758c; color: white; display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; margin-bottom: 15px; box-shadow: 0 0 25px #ff758c; animation: pulse 1.5s infinite; border: 3px solid white; }
        .call-status { font-size: 1.1rem; color: #ffccd5; margin-bottom: 25px; font-weight: bold; }
        
        .call-buttons { display: flex; gap: 20px; margin-bottom: 15px; z-index: 10; }
        .btn-call { border: none; padding: 12px 35px; border-radius: 30px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; }
        .btn-accept { background: #28a745; box-shadow: 0 4px 10px rgba(40,167,69,0.4); }
        .btn-decline { background: #dc3545; box-shadow: 0 4px 10px rgba(220,53,69,0.4); }

        /* ভিডিও স্ট্রিম উইন্ডো */
        .video-container { display: flex; gap: 10px; margin-top: 15px; width: 100%; max-width: 500px; justify-content: center; flex-wrap: wrap; }
        video { width: 45%; min-width: 140px; height: 180px; background: #222; border-radius: 12px; object-fit: cover; transform: scaleX(-1); border: 2px solid #ff758c; }

        /* 🔔 ইন-অ্যাপ নোটিফিকেশন পপআপ */
        .notification-toast { position: fixed; top: 20px; right: 20px; background: white; border-left: 6px solid #ff4d6d; padding: 15px 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 5px; z-index: 3000; animation: slideIn 0.3s ease-out; max-width: 320px; }
        .notification-toast h4 { color: #ff4d6d; font-size: 0.95rem; }
        .notification-toast p { color: #333; font-size: 0.85rem; }

        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 117, 140, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 117, 140, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 117, 140, 0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authScreen" class="auth-container">
    <h2>MHSMS সাইন-ইন 🌸</h2>
    <input type="text" id="usernameInput" placeholder="ইউজারনেম (ছোট হাতের ইংরেজি)">
    <input type="password" id="passwordInput" placeholder="পাসওয়ার্ড (নূন্যতম ৬ অক্ষর)">
    
    <div class="file-upload-wrapper">
        <label for="avatarFileInput" class="file-upload-btn">গ্যালারি থেকে ছবি নিন 📷</label>
        <input type="file" id="avatarFileInput" accept="image/*" style="display: none;" onchange="previewAndConvertImage(this)">
    </div>
    <div id="uploadStatus">কোনো ছবি নেওয়া হয়নি</div>
    
    <span class="auth-note">* নতুন অ্যাকাউন্ট খুললে ছবি আপলোড করতে পারেন।</span>
    <button id="authBtn" class="main-btn" onclick="handleAuth()">লগইন / রেজিস্টার</button>
</div>

<div id="appScreen" class="app-container hidden">
    <div class="sidebar">
        <div class="sidebar-header"><span class="animated-logo">MHSMS</span></div>
        <div class="add-friend-box">
            <input type="text" id="friendUsername" placeholder="বন্ধুর ইউজারনেম...">
            <button onclick="addFriend()">অ্যাড</button>
        </div>
        <ul class="friend-list" id="friendList"></ul>
        
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="handleLogout()">লগআউট করুন 🚪</button>
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-userinfo" id="currentChatUser">
                <span>কোনো বন্ধু সিলেক্ট করুন</span>
            </div>
            <div class="chat-actions-container hidden" id="chatActions">
                <button class="call-btn" onclick="makeCall('Audio')">📞</button>
                <button class="call-btn" onclick="makeCall('Video')">📹</button>
                <a href="https://wa.me/8801782601342" target="_blank" class="whatsapp-support-btn">সাপোর্ট</a>
            </div>
        </div>
        <div class="message-area" id="messageArea"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="মেসেজ লিখুন..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">পাঠান</button>
        </div>
    </div>
</div>

<div id="callOverlay" class="call-overlay hidden">
    <div id="callAvatarContainer"></div>
    <h2 id="callUserName">User</h2>
    <div class="call-status" id="callTypeStatus">Calling...</div>
    
    <div class="call-buttons">
        <button id="btnAcceptCall" class="btn-call btn-accept hidden" onclick="answerCall()">Receive</button>
        <button class="btn-call btn-decline" onclick="hangUpCall()">End Call</button>
    </div>

    <div id="videoStreams" class="video-container hidden">
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
</div>

<div id="notificationContainer"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1p-aoUP7QUEFqGCL5j7YE5RWnV7Uwd0A",
        authDomain: "hedayatul-4487e.firebaseapp.com",
        projectId: "hedayatul-4487e",
        storageBucket: "hedayatul-4487e.firebasestorage.app",
        messagingSenderId: "120479258973",
        appId: "1:120479258973:web:3280d2794466b1537030b4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;
    let activeChatFriend = null;
    let unsubscribeChat = null;
    let isInitialLoad = true;
    let cachedUsers = {}; 
    let globalBase64Image = ""; 
    
    let localStream = null;
    let remoteStream = null;
    let peerConnection = null;
    let currentCallId = null;

    const ringtoneAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/1360/1360-84.wav"); 
    const dialtoneAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/1743/1743-84.wav"); 
    const notifAudio = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav"); 

    ringtoneAudio.loop = true;
    dialtoneAudio.loop = true;

    const rtcConfig = {
        iceServers: [
            { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
        ]
    };

    // 🔄 অ্যাপ ওপেন হওয়ার সাথে সাথে চেক করবে আগে লগইন করা আছে কি না
    window.onload = function() {
        const savedUser = localStorage.getItem("mhsms_username");
        if (savedUser) {
            loginSuccess(savedUser);
        }
    };

    function previewAndConvertImage(input) {
        const file = input.files[0];
        if (file) {
            if (file.size > 150000) { 
                alert("ছবির সাইজ অনেক বড়! দয়া করে ছোট সাইজের ছবি দিন।");
                input.value = "";
                return;
            }
            const reader = new FileReader();
            reader.onload = function (e) {
                globalBase64Image = e.target.result; 
                document.getElementById('uploadStatus').innerText = "ছবি সফলভাবে যুক্ত হয়েছে! ✅";
            };
            reader.readAsDataURL(file);
        }
    }

    function createAvatarHTML(username, url, isLarge = false) {
        const cssClass = isLarge ? 'call-avatar-large' : 'user-avatar';
        if (url && url.trim() !== "") {
            return `<img src="${url}" class="${cssClass}" alt="${username}">`;
        } else {
            const firstLetter = username.charAt(0).toUpperCase();
            return `<div class="${cssClass}">${firstLetter}</div>`;
        }
    }

    async function handleAuth() {
        const username = document.getElementById('usernameInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value.trim();
        
        if(!username || password.length < 6) { alert("সঠিক ইউজারনেম ও পাসওয়ার্ড দিন।"); return; }
        try {
            const userRef = db.collection("users").doc(username);
            const doc = await userRef.get();
            if (doc.exists && doc.data().password === password) { 
                localStorage.setItem("mhsms_username", username); // লোকাল স্টোরেজে ইউজারনেম সেভ
                loginSuccess(username); 
            } 
            else if (!doc.exists) {
                await userRef.set({ username, password, avatar: globalBase64Image, friends: [] });
                localStorage.setItem("mhsms_username", username); // লোকাল স্টোরেজে ইউজারনেম সেভ
                loginSuccess(username);
            } else { alert("ভুল পাসওয়ার্ড!"); }
        } catch (e) { alert("এরর: " + e.message); }
    }

    function loginSuccess(username) {
        currentUser = username;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        
        // ইনপুট ফিল্ডগুলো রিসেট করা
        document.getElementById('usernameInput').value = "";
        document.getElementById('passwordInput').value = "";
        document.getElementById('avatarFileInput').value = "";
        document.getElementById('uploadStatus').innerText = "কোনো ছবি নেওয়া হয়নি";
        globalBase64Image = "";

        loadFriends();
        listenForIncomingCalls();
        listenForGlobalMessages();
    }

    // 🚪 লগআউট ফাংশন (যা লোকাল স্টোরেজ ক্লিয়ার করবে)
    function handleLogout() {
        if(confirm("আপনি কি নিশ্চিতভাবে লগআউট করতে চান?")) {
            localStorage.removeItem("mhsms_username"); // লোকাল স্টোরেজ ডিলিট
            currentUser = null;
            activeChatFriend = null;
            if (unsubscribeChat) unsubscribeChat();
            
            document.getElementById('appScreen').classList.add('hidden');
            document.getElementById('chatActions').classList.add('hidden');
            document.getElementById('messageArea').innerHTML = "";
            document.getElementById('currentChatUser').innerHTML = "<span>কোনো বন্ধু সিলেক্ট করুন</span>";
            document.getElementById('authScreen').classList.remove('hidden');
        }
    }

    function showNotificationPopup(title, body) {
        notifAudio.play().catch(e => {});
        const container = document.getElementById('notificationContainer');
        const toast = document.createElement('div');
        toast.classList.add('notification-toast');
        toast.innerHTML = `<h4>${title}</h4><p>${body}</p>`;
        container.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 4000);
    }

    function listenForGlobalMessages() {
        db.collectionGroup("messages").orderBy("timestamp", "desc").limit(1)
            .onSnapshot(snapshot => {
                if (isInitialLoad) { isInitialLoad = false; return; }
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.sender !== currentUser && activeChatFriend !== data.sender) {
                        showNotificationPopup(`📩 নতুন মেসেজ এসেছে!`, `${data.sender}: ${data.text}`);
                    }
                });
            });
    }

    async function getUserAvatar(username) {
        if (cachedUsers[username]) return cachedUsers[username];
        try {
            const doc = await db.collection("users").doc(username).get();
            if (doc.exists && doc.data().avatar) {
                cachedUsers[username] = doc.data().avatar;
                return doc.data().avatar;
            }
        } catch(e) {}
        return "";
    }

    function loadFriends() {
        db.collection("users").doc(currentUser).onSnapshot(async (doc) => {
            const list = document.getElementById('friendList');
            list.innerHTML = '';
            if(!doc.exists) return;
            
            const friends = doc.data().friends || [];
            for (const friend of friends) {
                const avatarUrl = await getUserAvatar(friend);
                const li = document.createElement('li');
                li.classList.add('friend-item');
                if(activeChatFriend === friend) li.classList.add('active');
                
                li.innerHTML = `
                    ${createAvatarHTML(friend, avatarUrl)}
                    <div class="friend-info">
                        <span>🌸 ${friend}</span>
                    </div>
                `;
                
                li.onclick = () => { 
                    activeChatFriend = friend; 
                    document.getElementById('currentChatUser').innerHTML = `
                        ${createAvatarHTML(friend, avatarUrl)}
                        <span>চ্যাট উইথ: ${friend}</span>
                    `; 
                    document.getElementById('chatActions').classList.remove('hidden');
                    loadMessages(); 
                };
                list.appendChild(li);
            }
        });
    }

    async function makeCall(type) {
        if(!activeChatFriend) return;
        currentCallId = currentUser + "_" + Date.now();
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: true, 
                video: type === 'Video' ? { width: { ideal: 320 }, height: { ideal: 240 }, facingMode: "user" } : false 
            });
            document.getElementById('videoStreams').classList.remove('hidden');
            document.getElementById('localVideo').srcObject = localStream;
        } catch (e) { 
            alert("ক্যামেরা/মাইক্রোফোন পারমিশন দিন বা ডিভাইস চেক করুন!"); 
            return; 
        }

        dialtoneAudio.play().catch(e => {});
        const friendAvatar = await getUserAvatar(activeChatFriend);
        showCallOverlay(activeChatFriend, friendAvatar, `${type} Call - Ringing...`, false);
        
        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        remoteStream = new MediaStream();
        document.getElementById('remoteVideo').srcObject = remoteStream;
        peerConnection.ontrack = event => {
            event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
        };

        const callDoc = db.collection("calls").doc(currentCallId);
        const callerCandidatesCollection = callDoc.collection("callerCandidates");
        peerConnection.onicecandidate = event => {
            if(event.candidate) callerCandidatesCollection.add(event.candidate.toJSON());
        };

        const offerDescription = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offerDescription);

        await callDoc.set({
            caller: currentUser,
            receiver: activeChatFriend,
            type: type,
            status: "ringing",
            offer: { type: offerDescription.type, sdp: offerDescription.sdp }
        });

        callDoc.onSnapshot(snapshot => {
            const data = snapshot.data();
            if (data && data.answer && !peerConnection.currentRemoteDescription) {
                const answerDescription = new RTCSessionDescription(data.answer);
                peerConnection.setRemoteDescription(answerDescription);
            }
        });

        callDoc.collection("receiverCandidates").onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added') {
                    peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(e => {});
                }
            });
        });

        listenToCallStatus();
    }

    function listenForIncomingCalls() {
        db.collection("calls")
            .where("receiver", "==", currentUser)
            .where("status", "==", "ringing")
            .onSnapshot(async (snapshot) => {
                for (const doc of snapshot.docs) {
                    if (currentCallId) return; 
                    const data = doc.data();
                    currentCallId = doc.id;

                    ringtoneAudio.play().catch(e => {});
                    const callerAvatar = await getUserAvatar(data.caller);
                    showNotificationPopup("📞 ইনকামিং কল!", `${data.caller} আপনাকে কল দিচ্ছেন...`);
                    showCallOverlay(data.caller, callerAvatar, `Incoming ${data.type} Call...`, true);
                }
            });
    }

    async function answerCall() {
        ringtoneAudio.pause();
        ringtoneAudio.currentTime = 0;

        const callDoc = db.collection("calls").doc(currentCallId);
        const docSnapshot = await callDoc.get();
        if(!docSnapshot.exists) return;
        const data = docSnapshot.data();

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: true, 
                video: data.type === 'Video' ? { width: { ideal: 320 }, height: { ideal: 240 }, facingMode: "user" } : false 
            });
            document.getElementById('videoStreams').classList.remove('hidden');
            document.getElementById('localVideo').srcObject = localStream;
        } catch (e) { 
            alert("ক্যামেরা বা মাইক্রোফোন ওপেন করা যায়নি!"); 
            return; 
        }

        document.getElementById('callTypeStatus').innerText = "Connecting...";
        document.getElementById('btnAcceptCall').classList.add('hidden');

        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        remoteStream = new MediaStream();
        document.getElementById('remoteVideo').srcObject = remoteStream;
        peerConnection.ontrack = event => {
            event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
        };

        const receiverCandidatesCollection = callDoc.collection("receiverCandidates");
        peerConnection.onicecandidate = event => {
            if(event.candidate) receiverCandidatesCollection.add(event.candidate.toJSON());
        };

        const offerDescription = data.offer;
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offerDescription));

        const answerDescription = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answerDescription);

        await callDoc.update({
            status: "accepted",
            answer: { type: answerDescription.type, sdp: answerDescription.sdp }
        });

        callDoc.collection("callerCandidates").onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added') {
                    peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(e => {});
                }
            });
        });

        listenToCallStatus();
    }

    function listenToCallStatus() {
        db.collection("calls").doc(currentCallId).onSnapshot(doc => {
            if(!doc.exists) { cleanUpCallUI(); return; }
            const data = doc.data();
            if(data.status === "accepted") {
                dialtoneAudio.pause(); dialtoneAudio.currentTime = 0;
                ringtoneAudio.pause(); ringtoneAudio.currentTime = 0;
                document.getElementById('callTypeStatus').innerText = "Call Connected & Speaking... 🎙️";
            } else if(data.status === "ended") {
                cleanUpCallUI();
            }
        });
    }

    async function hangUpCall() {
        if(currentCallId) {
            try {
                await db.collection("calls").doc(currentCallId).update({ status: "ended" });
                await db.collection("calls").doc(currentCallId).delete();
            } catch(e){}
        }
        cleanUpCallUI();
    }

    function showCallOverlay(name, avatarUrl, status, isIncoming) {
        document.getElementById('callUserName').innerText = name;
        document.getElementById('callTypeStatus').innerText = status;
        document.getElementById('callAvatarContainer').innerHTML = createAvatarHTML(name, avatarUrl, true);
        document.getElementById('callOverlay').classList.remove('hidden');
        if(isIncoming) { document.getElementById('btnAcceptCall').classList.remove('hidden'); }
    }

    function cleanUpCallUI() {
        dialtoneAudio.pause(); dialtoneAudio.currentTime = 0;
        ringtoneAudio.pause(); ringtoneAudio.currentTime = 0;

        document.getElementById('callOverlay').classList.add('hidden');
        document.getElementById('btnAcceptCall').classList.add('hidden');
        document.getElementById('videoStreams').classList.add('hidden');
        
        if(peerConnection) { peerConnection.close(); peerConnection = null; }
        if(localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        if(remoteStream) { remoteStream.getTracks().forEach(track => track.stop()); remoteStream = null; }
        currentCallId = null;
    }

    function loadMessages() {
        if (unsubscribeChat) unsubscribeChat();
        const chatId = [currentUser, activeChatFriend].sort().join('_');
        unsubscribeChat = db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "asc")
            .onSnapshot(snapshot => {
                const area = document.getElementById('messageArea'); area.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const wrapper = document.createElement('div'); wrapper.classList.add('message-wrapper');
                    const container = document.createElement('div'); container.classList.add('message-container');
                    const msgDiv = document.createElement('div'); msgDiv.classList.add('message', data.sender === currentUser ? 'outgoing' : 'incoming');
                    container.style.justifyContent = data.sender === currentUser ? 'flex-end' : 'flex-start';
                    msgDiv.innerHTML = `<div>${data.text}</div>`;
                    const timeDiv = document.createElement('span'); timeDiv.classList.add('msg-time');
                    timeDiv.innerText = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    timeDiv.style.alignSelf = data.sender === currentUser ? 'flex-end' : 'flex-start';
                    container.appendChild(msgDiv); wrapper.appendChild(container); wrapper.appendChild(timeDiv); area.appendChild(wrapper);
                });
                area.scrollTop = area.scrollHeight;
            });
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput'); const text = input.value.trim();
        if (!text || !activeChatFriend) return;
        const chatId = [currentUser, activeChatFriend].sort().join('_');
        const msgData = { sender: currentUser, text, timestamp: new Date().getTime() };
        await db.collection("chats").doc(chatId).collection("messages").add(msgData);
        input.value = '';
    }

    async function addFriend() { 
        const f = document.getElementById('friendUsername').value.trim().toLowerCase(); 
        if(!f || f === currentUser) return; 
        try {
            await db.collection("users").doc(currentUser).update({ friends: firebase.firestore.FieldValue.arrayUnion(f) }); 
            await db.collection("users").doc(f).update({ friends: firebase.firestore.FieldValue.arrayUnion(currentUser) }); 
            alert("যুক্ত হয়েছে!"); 
            document.getElementById('friendUsername').value = ''; 
        } catch(e) { alert("ইউজারটি খুঁজে পাওয়া যায়নি!"); }
    }
    document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
</script>
