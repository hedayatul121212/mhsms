<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHSMS - লাইভ চ্যাট, কল, এডিট ও ডিলিট</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .app-container { width: 100%; max-width: 950px; height: 85vh; background: rgba(255, 255, 255, 0.9); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; overflow: hidden; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        
        /* Auth Screen */
        .auth-container { width: 100%; max-width: 400px; background: white; padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 2px solid #ffb7b2; }
        .auth-container h2 { margin-bottom: 15px; color: #ff6b6b; font-size: 1.8rem; }
        .auth-container input[type="text"], .auth-container input[type="password"] { width: 100%; padding: 12px 20px; margin: 8px 0; border: 1px solid #ffccd5; border-radius: 25px; outline: none; transition: 0.3s; font-size: 0.9rem; }
        
        .upload-section { margin: 15px 0; text-align: center; background: #fff5f7; padding: 10px; border-radius: 15px; border: 1px dashed #ff758c; }
        .upload-section span { font-size: 0.9rem; color: #4a4a4a; display: block; margin-bottom: 5px; font-weight: bold; }
        .upload-section input[type="file"] { width: 100%; font-size: 0.85rem; color: #555; }
        #uploadStatus { font-size: 0.85rem; color: #28a745; font-weight: bold; margin-top: 5px; }

        .auth-container button.main-btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #ff6b6b, #ff8e8e); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; }

        /* Avatar & Status Style */
        .avatar-container { position: relative; display: inline-block; width: 40px; height: 40px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #ff758c; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.1rem; border: 2px solid white; }
        .status-dot { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background: #ccc; border: 2px solid white; border-radius: 50%; }
        .status-dot.online { background: #28a745; box-shadow: 0 0 8px #28a745; }
        
        /* Sidebar */
        .sidebar { width: 30%; border-right: 1px solid #ffe5ec; display: flex; flex-direction: column; background: #fff5f7; }
        .sidebar-header { padding: 20px 15px; background: linear-gradient(45deg, #ff758c, #ff7eb3); color: white; font-weight: bold; font-size: 1.3rem; text-align: center; }
        .add-friend-box { padding: 12px; display: flex; gap: 8px; background: #fff; border-bottom: 1px solid #ffe5ec; }
        .add-friend-box input { flex: 1; padding: 10px; border: 1px solid #ffccd5; border-radius: 20px; outline: none; }
        .add-friend-box button { padding: 0 15px; background: #ff4d6d; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        .friend-list { flex: 1; overflow-y: auto; list-style: none; }
        .friend-item { padding: 12px; border-bottom: 1px solid #ffe5ec; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .friend-item:hover { background: #ffe5ec; }
        .friend-item.active { background: #ffccd5; }
        .friend-info { flex: 1; display: flex; flex-direction: column; }
        .friend-info .last-seen { font-size: 0.75rem; color: #777; margin-top: 2px; }

        .sidebar-footer { padding: 15px; background: #fff; border-top: 1px solid #ffe5ec; text-align: center; }
        .logout-btn { width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* Chat Area */
        .chat-area { width: 70%; display: flex; flex-direction: column; background: #fffbfb; position: relative; }
        .chat-header { padding: 12px 15px; background: #fff0f3; border-bottom: 1px solid #ffe5ec; display: flex; justify-content: space-between; align-items: center; }
        .chat-header-userinfo { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #ff4d6d; }
        .chat-actions-container { display: flex; align-items: center; gap: 15px; }
        .call-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; }
        
        .message-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png'); }
        .message-wrapper { display: flex; flex-direction: column; width: 100%; margin-bottom: 5px; }
        .message-container { display: flex; align-items: center; width: 100%; position: relative; gap: 8px; }
        .message { padding: 12px 16px; border-radius: 20px; max-width: 65%; word-wrap: break-word; font-size: 0.95rem; position: relative; cursor: pointer; }
        .message.incoming { background: #f1f3f5; align-self: flex-start; border-bottom-left-radius: 5px; color: #333; }
        .message.outgoing { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; align-self: flex-end; border-bottom-right-radius: 5px; }
        
        /* Reply Box Style Inside Message */
        .reply-in-msg { background: rgba(0, 0, 0, 0.05); padding: 6px 10px; border-left: 3px solid #ff4d6d; border-radius: 5px; margin-bottom: 5px; font-size: 0.85rem; color: #555; }
        .message.outgoing .reply-in-msg { background: rgba(255, 255, 255, 0.2); color: #fff; border-left-color: #fff; }

        /* Message Action Overlay Buttons */
        .msg-actions { display: none; gap: 5px; }
        .message-container:hover .msg-actions { display: flex; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 0.85rem; padding: 2px 5px; border-radius: 3px; background: rgba(0,0,0,0.05); }
        .action-btn:hover { background: rgba(0,0,0,0.1); }

        /* Reply Preview Box Above Input */
        .reply-preview { display: flex; justify-content: space-between; align-items: center; background: #ffe5ec; padding: 8px 15px; border-left: 5px solid #ff758c; font-size: 0.85rem; }
        .reply-preview button { background: none; border: none; color: #ff4d6d; font-weight: bold; cursor: pointer; }

        .msg-time { font-size: 0.7rem; color: #a1a1a1; margin-top: 4px; }

        .input-area { display: flex; padding: 15px; border-top: 1px solid #ffe5ec; background: #fff0f3; }
        .input-area input { flex: 1; padding: 14px 20px; border: 1px solid #ffccd5; border-radius: 30px; outline: none; }
        .input-area button { background: linear-gradient(45deg, #ff758c, #ff7eb3); color: white; border: none; padding: 0 25px; margin-left: 10px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        
        /* Call Overlay */
        .call-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: white; text-align: center; }
        .video-container { display: flex; gap: 10px; margin-top: 15px; width: 100%; max-width: 500px; justify-content: center; }
        video { width: 45%; height: 180px; background: #222; border-radius: 12px; object-fit: cover; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="authScreen" class="auth-container">
    <h2>MHSMS সাইন-ইন 🌸</h2>
    <input type="text" id="usernameInput" placeholder="ইউজারনেম (ছোট হাতের ইংরেজি)">
    <input type="password" id="passwordInput" placeholder="পাসওয়ার্ড (নূন্যতম ৬ অক্ষর)">
    <div class="upload-section">
        <span>প্রোফাইল পিকচার আপলোড করুন 📷</span>
        <input type="file" id="avatarFileInput" accept="image/*" onchange="previewAndConvertImage(this)">
    </div>
    <div id="uploadStatus">কোনো ছবি নেওয়া হয়নি</div>
    <button id="authBtn" class="main-btn" onclick="handleAuth()">লগইন / রেজিস্টার</button>
</div>

<div id="appScreen" class="app-container hidden">
    <div class="sidebar">
        <div class="sidebar-header">MHSMS</div>
        <div class="add-friend-box">
            <input type="text" id="friendUsername" placeholder="বন্ধুর ইউজারনেম...">
            <button onclick="addFriend()">অ্যাড</button>
        </div>
        <ul class="friend-list" id="friendList"></ul>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="handleLogout()">লগআউট করুন 🚪</button>
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <div class="chat-header-userinfo" id="currentChatUser">
                <span>কোনো বন্ধু সিলেক্ট করুন</span>
            </div>
            <div class="chat-actions-container hidden" id="chatActions">
                <button class="call-btn" onclick="makeCall('Audio')">📞</button>
                <button class="call-btn" onclick="makeCall('Video')">📹</button>
            </div>
        </div>
        
        <div class="message-area" id="messageArea"></div>

        <div id="replyPreviewBox" class="reply-preview hidden">
            <span id="replyPreviewText">রিপ্লাই...</span>
            <button onclick="cancelReply()">✕</button>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="মেসেজ লিখুন..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">পাঠান</button>
        </div>
    </div>
</div>

<div id="callOverlay" class="call-overlay hidden">
    <h2 id="callUserName">User</h2>
    <div id="callTypeStatus">Calling...</div>
    <div style="margin-top:20px;">
        <button id="btnAcceptCall" style="padding:10px 20px; background:green; color:white; border:none; margin-right:10px;" class="hidden" onclick="answerCall()">Receive</button>
        <button style="padding:10px 20px; background:red; color:white; border:none;" onclick="hangUpCall()">End Call</button>
    </div>
    <div id="videoStreams" class="video-container hidden">
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1p-aoUP7QUEFqGCL5j7YE5RWnV7Uwd0A",
        authDomain: "hedayatul-4487e.firebaseapp.com",
        projectId: "hedayatul-4487e",
        storageBucket: "hedayatul-4487e.firebasestorage.app",
        messagingSenderId: "120479258973",
        appId: "1:120479258973:web:3280d2794466b1537030b4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = null;
    let activeChatFriend = null;
    let unsubscribeChat = null;
    let cachedUsers = {}; 
    let globalBase64Image = ""; 
    let selectedReplyMsg = null;
    let editMessageId = null;

    let localStream, remoteStream, peerConnection, currentCallId;
    const rtcConfig = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

    window.onload = function() {
        const savedUser = localStorage.getItem("mhsms_username");
        if (savedUser) loginSuccess(savedUser);
    };

    function previewAndConvertImage(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) { globalBase64Image = e.target.result; document.getElementById('uploadStatus').innerText = "ছবি যুক্ত হয়েছে! ✅"; };
            reader.readAsDataURL(file);
        }
    }

    function createAvatarHTML(username, url, isOnline, lastActiveTime) {
        let statusClass = isOnline ? 'online' : '';
        let avatarContent = url ? `<img src="${url}" class="user-avatar">` : `<div class="user-avatar">${username.charAt(0).toUpperCase()}</div>`;
        return `<div class="avatar-container">${avatarContent}<div class="status-dot ${statusClass}"></div></div>`;
    }

    async function handleAuth() {
        const username = document.getElementById('usernameInput').value.trim().toLowerCase();
        const password = document.getElementById('passwordInput').value.trim();
        if(!username || password.length < 6) { alert("সঠিক তথ্য দিন।"); return; }
        
        const userRef = db.collection("users").doc(username);
        const doc = await userRef.get();
        if (doc.exists && doc.data().password === password) {
            localStorage.setItem("mhsms_username", username);
            loginSuccess(username);
        } else if (!doc.exists) {
            await userRef.set({ username, password, avatar: globalBase64Image, friends: [], lastActive: Date.now() });
            localStorage.setItem("mhsms_username", username);
            loginSuccess(username);
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    function loginSuccess(username) {
        currentUser = username;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        updateUserStatus(true);
        loadFriends();
        listenForIncomingCalls();

        // প্রতি ১ মিনিটে নিজের অনলাইন স্ট্যাটাস আপডেট করার লুপ
        setInterval(() => updateUserStatus(true), 60000);
    }

    function updateUserStatus(isOnline) {
        if (!currentUser) return;
        db.collection("users").doc(currentUser).update({
            lastActive: Date.now(),
            isOnline: isOnline
        });
    }

    function handleLogout() {
        updateUserStatus(false);
        localStorage.removeItem("mhsms_username");
        location.reload();
    }

    function formatLastSeen(timestamp) {
        if (!timestamp) return "Offline";
        const diff = Date.now() - timestamp;
        const mins = Math.floor(diff / 60000);
        if (mins < 2) return "Just now";
        if (mins < 60) return `${mins}m ago`;
        const hours = Math.floor(mins / 60);
        if (hours < 24) return `${hours}h ago`;
        return new Date(timestamp).toLocaleDateString();
    }

    function loadFriends() {
        db.collection("users").doc(currentUser).onSnapshot(() => {
            db.collection("users").onSnapshot(async (snapshot) => {
                const list = document.getElementById('friendList');
                list.innerHTML = '';
                
                // নিজের প্রোফাইল ছাড়া বাকি সব বন্ধুদের তালিকায় আনা
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.username === currentUser) return;

                    // অনলাইন স্ট্যাটাস ৩ মিনিটের বেশি পুরানো হলে অফলাইন দেখাবে
                    const isOnline = data.isOnline && (Date.now() - data.lastActive < 180000);
                    const lastSeenText = isOnline ? "Active now" : formatLastSeen(data.lastActive);

                    const li = document.createElement('li');
                    li.classList.add('friend-item');
                    if (activeChatFriend === data.username) li.classList.add('active');

                    li.innerHTML = `
                        ${createAvatarHTML(data.username, data.avatar, isOnline)}
                        <div class="friend-info">
                            <span>🌸 ${data.username}</span>
                            <span class="last-seen">${lastSeenText}</span>
                        </div>
                    `;

                    li.onclick = () => {
                        activeChatFriend = data.username;
                        document.getElementById('currentChatUser').innerHTML = `
                            ${createAvatarHTML(data.username, data.avatar, isOnline)}
                            <span>${data.username} (${lastSeenText})</span>
                        `;
                        document.getElementById('chatActions').classList.remove('hidden');
                        loadMessages();
                    };
                    list.appendChild(li);
                });
            });
        });
    }

    function loadMessages() {
        if (unsubscribeChat) unsubscribeChat();
        const chatId = [currentUser, activeChatFriend].sort().join('_');
        
        unsubscribeChat = db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "asc")
            .onSnapshot(snapshot => {
                const area = document.getElementById('messageArea');
                area.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const msgId = doc.id;
                    const isOwn = data.sender === currentUser;

                    const wrapper = document.createElement('div');
                    wrapper.classList.add('message-wrapper');
                    
                    const container = document.createElement('div');
                    container.classList.add('message-container');
                    container.style.justifyContent = isOwn ? 'flex-end' : 'flex-start';

                    const msgDiv = document.createElement('div');
                    msgDiv.classList.add('message', isOwn ? 'outgoing' : 'incoming');
                    
                    let replyHTML = data.replyTo ? `<div class="reply-in-msg"><b>↪ ${data.replyTo.sender}:</b> ${data.replyTo.text}</div>` : '';
                    msgDiv.innerHTML = `${replyHTML}<div>${data.text}</div>`;

                    // অ্যাকশন বাটন (Reply, Edit, Delete)
                    const actionsDiv = document.createElement('div');
                    actionsDiv.classList.add('msg-actions');
                    
                    let deleteBtn = isOwn ? `<button class="action-btn" onclick="deleteMessage('${msgId}')">🗑️</button>` : '';
                    let editBtn = isOwn ? `<button class="action-btn" onclick="startEditMessage('${msgId}', '${data.text}')">✏️</button>` : '';
                    let replyBtn = `<button class="action-btn" onclick="startReplyMessage('${data.sender}', '${data.text}')">↪️</button>`;

                    actionsDiv.innerHTML = replyBtn + editBtn + deleteBtn;

                    if (isOwn) {
                        container.appendChild(actionsDiv);
                        container.appendChild(msgDiv);
                    } else {
                        container.appendChild(msgDiv);
                        container.appendChild(actionsDiv);
                    }

                    const timeDiv = document.createElement('span');
                    timeDiv.classList.add('msg-time');
                    timeDiv.innerText = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    timeDiv.style.alignSelf = isOwn ? 'flex-end' : 'flex-start';

                    wrapper.appendChild(container);
                    wrapper.appendChild(timeDiv);
                    area.appendChild(wrapper);
                });
                area.scrollTop = area.scrollHeight;
            });
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !activeChatFriend) return;

        const chatId = [currentUser, activeChatFriend].sort().join('_');

        if (editMessageId) {
            // মেসেজ এডিট করা হলে
            await db.collection("chats").doc(chatId).collection("messages").doc(editMessageId).update({ text: text });
            editMessageId = null;
            document.getElementById('sendBtn').innerText = "পাঠান";
        } else {
            // নতুন মেসেজ বা রিপ্লাই মেসেজ পাঠানো
            const msgData = {
                sender: currentUser,
                text: text,
                timestamp: new Date().getTime(),
                replyTo: selectedReplyMsg
            };
            await db.collection("chats").doc(chatId).collection("messages").add(msgData);
        }

        input.value = '';
        cancelReply();
    }

    function startReplyMessage(sender, text) {
        selectedReplyMsg = { sender, text };
        document.getElementById('replyPreviewText').innerText = `Reply to ${sender}: ${text}`;
        document.getElementById('replyPreviewBox').classList.remove('hidden');
    }

    function cancelReply() {
        selectedReplyMsg = null;
        document.getElementById('replyPreviewBox').classList.add('hidden');
    }

    function startEditMessage(id, oldText) {
        editMessageId = id;
        document.getElementById('messageInput').value = oldText;
        document.getElementById('sendBtn').innerText = "আপডেট";
    }

    async function deleteMessage(id) {
        if (confirm("মেসেজটি ডিলিট করতে চান?")) {
            const chatId = [currentUser, activeChatFriend].sort().join('_');
            await db.collection("chats").doc(chatId).collection("messages").doc(id).delete();
        }
    }

    async function addFriend() {
        const f = document.getElementById('friendUsername').value.trim().toLowerCase();
        if(!f || f === currentUser) return;
        await db.collection("users").doc(currentUser).update({ friends: firebase.firestore.FieldValue.arrayUnion(f) });
        alert("বন্ধু যুক্ত হয়েছে!");
    }

    // [আগের কলিং ফাংশনগুলো (makeCall, listenForIncomingCalls, answerCall, hangUpCall) অপরিবর্তিত থাকবে]
    async function makeCall(type) {
        if(!activeChatFriend) return;
        currentCallId = currentUser + "_" + Date.now();
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'Video' });
        document.getElementById('videoStreams').classList.remove('hidden');
        document.getElementById('localVideo').srcObject = localStream;
        
        showCallOverlay(activeChatFriend, `${type} Call - Ringing...`, false);
        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        remoteStream = new MediaStream();
        document.getElementById('remoteVideo').srcObject = remoteStream;
        peerConnection.ontrack = e => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));

        const callDoc = db.collection("calls").doc(currentCallId);
        peerConnection.onicecandidate = e => e.candidate && callDoc.collection("callerCandidates").add(e.candidate.toJSON());

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        await callDoc.set({ caller: currentUser, receiver: activeChatFriend, type, status: "ringing", offer: {type: offer.type, sdp: offer.sdp} });

        callDoc.onSnapshot(snap => { if(snap.data()?.answer) peerConnection.setRemoteDescription(new RTCSessionDescription(snap.data().answer)); });
        callDoc.collection("receiverCandidates").onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && peerConnection.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        listenToCallStatus();
    }

    function listenForIncomingCalls() {
        db.collection("calls").where("receiver", "==", currentUser).where("status", "==", "ringing").onSnapshot(snap => {
            snap.forEach(doc => {
                if (currentCallId) return;
                currentCallId = doc.id;
                showCallOverlay(doc.data().caller, `Incoming ${doc.data().type} Call...`, true);
            });
        });
    }

    async function answerCall() {
        const callDoc = db.collection("calls").doc(currentCallId);
        const data = (await callDoc.get()).data();
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: data.type === 'Video' });
        document.getElementById('videoStreams').classList.remove('hidden');
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('btnAcceptCall').classList.add('hidden');

        peerConnection = new RTCPeerConnection(rtcConfig);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        remoteStream = new MediaStream(); document.getElementById('remoteVideo').srcObject = remoteStream;
        peerConnection.ontrack = e => e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));

        peerConnection.onicecandidate = e => e.candidate && callDoc.collection("receiverCandidates").add(e.candidate.toJSON());
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const ans = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(ans);
        await callDoc.update({ status: "accepted", answer: {type: ans.type, sdp: ans.sdp} });

        callDoc.collection("callerCandidates").onSnapshot(s => s.docChanges().forEach(c => c.type==='added' && peerConnection.addIceCandidate(new RTCIceCandidate(c.doc.data()))));
        listenToCallStatus();
    }

    function listenToCallStatus() {
        db.collection("calls").doc(currentCallId).onSnapshot(doc => {
            if(!doc.exists || doc.data().status === "ended") cleanUpCallUI();
            if(doc.data()?.status === "accepted") document.getElementById('callTypeStatus').innerText = "Call Connected... 🎙️";
        });
    }

    async function hangUpCall() { 
        if(currentCallId) { await db.collection("calls").doc(currentCallId).update({status: "ended"}).catch(()=>{}); } 
        cleanUpCallUI(); 
    }
    
    function cleanUpCallUI() {
        document.getElementById('callOverlay').classList.add('hidden');
        if(peerConnection) peerConnection.close();
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        currentCallId = null;
    }

    function showCallOverlay(name, status, isIncoming) {
        document.getElementById('callUserName').innerText = name;
        document.getElementById('callTypeStatus').innerText = status;
        document.getElementById('callOverlay').classList.remove('hidden');
        if(isIncoming) document.getElementById('btnAcceptCall').classList.remove('hidden');
    }

    document.getElementById('messageInput').addEventListener('keypress', e => e.key === 'Enter' && sendMessage());
</script>
</body>
</html>
