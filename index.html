<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHSMS</title>
    <style>
        /* 🎨 Global Dark Mode Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #17212b; color: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; overflow: hidden; }
        
        .admin-notice-bar { width: 100%; max-width: 450px; background: #2b5278; color: #fff; padding: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; border-bottom: 1px solid #101921; z-index: 10; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; background: #17212b; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* 🔐 Auth Screen */
        .auth-container { width: 100%; max-width: 450px; height: 100vh; background: #17212b; padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow-y: auto; }
        .auth-container .app-logo { font-size: 4rem; margin-bottom: 15px; color: #2481cc; }
        .auth-container h2 { margin-bottom: 8px; color: #fff; font-size: 1.6rem; font-weight: 500; }
        .auth-container p { color: #7f91a4; font-size: 0.9rem; margin-bottom: 20px; }
        .auth-container input { width: 100%; padding: 14px; margin: 8px 0; background: #24303f; border: 1px solid #2f3e4e; border-radius: 10px; outline: none; color: white; font-size: 1rem; }
        .auth-container input:focus { border-color: #2481cc; }
        .auth-container button { width: 100%; padding: 14px; background: #2481cc; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .auth-toggle-link { color: #2481cc; font-size: 0.9rem; margin-top: 15px; cursor: pointer; text-decoration: none; }
        
        /* Profile Pic Upload Label */
        .file-input-label { display: block; width: 100%; padding: 12px; background: #24303f; border: 1px dashed #2481cc; border-radius: 10px; color: #2481cc; cursor: pointer; margin: 8px 0; font-size: 0.95rem; }

        /* 🔝 Header */
        .tg-header { background: #233140; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #101921; }
        .tg-header-left { display: flex; align-items: center; gap: 15px; }
        .tg-title { font-size: 1.25rem; font-weight: 500; color: #fff; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .tg-search-bar { background: #17212b; margin: 8px 12px; padding: 10px 15px; border-radius: 10px; display: flex; align-items: center; }
        .tg-search-bar input { background: none; border: none; outline: none; color: white; width: 100%; font-size: 0.95rem; }

        /* 👥 Chat List */
        .friend-list { flex: 1; overflow-y: auto; list-style: none; background: #17212b; }
        .friend-item { padding: 12px 16px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #101921; }
        .friend-item:hover { background: #202b36; }
        
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #2481cc; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.15rem; text-transform: uppercase; background-size: cover; background-position: center; }
        
        .chat-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .chat-name { font-weight: 500; color: #fff; font-size: 1rem; }
        .chat-preview { font-size: 0.9rem; color: #7f91a4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 💬 Chat Window & Swipe Mechanism */
        .chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0e1621; display: flex; flex-direction: column; z-index: 100; transform: translateX(100%); transition: transform 0.22s ease-in-out; }
        .chat-window.open { transform: translateX(0); }
        .chat-win-header { background: #17212b; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #111a22; }
        .chat-win-left { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
        .back-btn { font-size: 1.4rem; color: #fff; background: none; border: none; cursor: pointer; }

        .message-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #0e1621; }
        .message-wrapper { display: flex; flex-direction: column; width: 100%; position: relative; overflow: hidden; }
        
        .message { padding: 10px 14px; border-radius: 12px; max-width: 75%; word-wrap: break-word; font-size: 0.95rem; position: relative; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.1s linear; user-select: none; }
        .message.incoming { background: #182533; align-self: flex-start; color: #fff; border-bottom-left-radius: 3px; }
        .message.outgoing { background: #2b5278; align-self: flex-end; color: #fff; border-bottom-right-radius: 3px; }
        
        .msg-media { max-width: 100%; border-radius: 8px; margin-top: 5px; max-height: 200px; object-fit: cover; }
        .msg-audio { margin-top: 5px; max-width: 240px; }
        .reply-box-in-msg { background: rgba(0, 0, 0, 0.2); border-left: 3px solid #2481cc; padding: 4px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 0.85rem; color: #b2c1d1; }

        /* 📍 Reply Panel */
        .reply-preview-bar { background: #233140; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #111a22; font-size: 0.9rem; color: #7f91a4; }
        .reply-preview-bar span { border-left: 3px solid #2481cc; padding-left: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .close-reply-btn { background: none; border: none; color: #ff5252; cursor: pointer; font-size: 1.1rem; }

        .input-area { display: flex; padding: 8px 10px; background: #17212b; align-items: center; gap: 8px; border-top: 1px solid #111a22; }
        .input-wrap { flex: 1; background: #24303f; border-radius: 22px; display: flex; align-items: center; padding: 0 14px; gap: 10px; }
        .input-wrap input { flex: 1; padding: 10px 0; background: none; border: none; outline: none; color: white; font-size: 0.95rem; }
        .attach-btn, .emoji-btn { font-size: 1.3rem; color: #7f91a4; background: none; border: none; cursor: pointer; display: flex; align-items: center; }
        .mic-send-btn { width: 40px; height: 40px; background: #2481cc; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; color: white; font-size: 1.2rem; cursor: pointer; }

        .add-friend-bar { background: #233140; padding: 10px 15px; display: flex; gap: 10px; border-bottom: 1px solid #101921; }
        .add-friend-bar input { flex: 1; padding: 8px 12px; background: #17212b; border: none; border-radius: 6px; color: white; outline: none; }
        .add-friend-bar button { padding: 8px 15px; background: #2481cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="adminNotice" class="admin-notice-bar hidden">📢 নোটিশ...</div>

<div id="authScreen" class="auth-container">
    <div class="app-logo">🚀</div>
    <h2 id="authTitle">MHSMS - লগইন</h2>
    <p id="authDesc">আপনার একাউন্টে প্রবেশ করুন</p>
    
    <input type="text" id="authUsername" placeholder="ইউজারনেম">
    <input type="email" id="authEmail" class="hidden" placeholder="জিমেইল এড্রেস (Gmail)">
    
    <label id="avatarLabel" for="authAvatarFile" class="file-input-label hidden">👤 প্রোফাইল পিকচার সিলেক্ট করুন</label>
    <input type="file" id="authAvatarFile" class="hidden" accept="image/*" onchange="handleProfilePicSelect(this)">
    
    <input type="password" id="authPassword" placeholder="পাসওয়ার্ড">
    <input type="password" id="authConfirmPassword" class="hidden" placeholder="নতুন পাসওয়ার্ডটি আবার দিন">
    
    <button id="authSubmitBtn" onclick="handleAuthSubmit()">লগইন করুন</button>
    
    <div class="auth-toggle-link" id="toggleLink1" onclick="switchAuthMode('signup')">নতুন একাউন্ট খুলুন (Sign Up)</div>
    <div class="auth-toggle-link" id="toggleLink2" onclick="switchAuthMode('forgot')">পাসওয়ার্ড ভুলে গেছেন? (Forgot Password)</div>
</div>

<div id="appScreen" class="app-container hidden">
    <div class="tg-header">
        <div class="tg-header-left">
            <div class="tg-title">MHSMS</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">লগআউট</button>
    </div>

    <div class="add-friend-bar">
        <input type="text" id="friendUsername" placeholder="বন্ধুর ইউজারনেম...">
        <button onclick="addFriend()">অ্যাড</button>
    </div>

    <div class="tg-search-bar"><input type="text" placeholder="Search Chats"></div>

    <ul class="friend-list" id="friendList"></ul>
    
    <div id="chatWindow" class="chat-window">
        <div class="chat-win-header">
            <div class="chat-win-left" onclick="closeChatWindow()">
                <button class="back-btn">←</button>
                <div class="avatar" id="activeChatAvatar" style="width:40px; height:40px;"></div>
                <div class="user-details">
                    <span class="chat-name" id="currentChatUser">User</span>
                    <span class="user-status" id="currentUserStatus">online</span>
                </div>
            </div>
        </div>
        
        <div class="message-area" id="messageArea"></div>

        <div id="replyPreviewBar" class="reply-preview-bar hidden">
            <span id="replyPreviewText">Replying to...</span>
            <button class="close-reply-btn" onclick="cancelReply()">✕</button>
        </div>
        
        <div class="input-area">
            <div class="input-wrap">
                <label for="chatAudioFile" class="emoji-btn">🎙️</label>
                <input type="file" id="chatAudioFile" class="hidden" accept="audio/*" onchange="handleChatAudioSelect(this)">
                
                <input type="text" id="messageInput" placeholder="Message" autocomplete="off">
                
                <label for="chatImageFile" class="attach-btn">📎</label>
                <input type="file" id="chatImageFile" class="hidden" accept="image/*" onchange="handleChatImageSelect(this)">
            </div>
            <button id="micSendBtn" class="mic-send-btn" onclick="sendMessage()">🚀</button>
        </div>
    </div>
</div>

<audio id="smsRingtone" src="618f3287-new_facebook_ringtone_7.m4a" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1p-aoUP7QUEFqGCL5j7YE5RWnV7Uwd0A",
        authDomain: "hedayatul-4487e.firebaseapp.com",
        projectId: "hedayatul-4487e",
        storageBucket: "hedayatul-4487e.firebasestorage.app",
        messagingSenderId: "120479258973",
        appId: "1:120479258973:web:3280d2794466b1537030b4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentUser = localStorage.getItem("mhsms_user") || null;
    let activeChatFriend = null;
    let unsubscribeChat = null;
    let isInitialLoad = true;
    let authMode = "login";
    let selectedReplyMsgId = null;
    let selectedReplyText = "";
    let base64AvatarString = ""; // প্রোফাইল পিক ডাটা সেভ রাখার জন্য

    window.onload = function() { if(currentUser) loginSuccess(currentUser); };

    function switchAuthMode(mode) {
        authMode = mode;
        const emailField = document.getElementById("authEmail");
        const avatarLabel = document.getElementById("avatarLabel");
        const confirmField = document.getElementById("authConfirmPassword");
        const submitBtn = document.getElementById("authSubmitBtn");

        if(mode === 'login') {
            emailField.classList.add("hidden"); avatarLabel.classList.add("hidden"); confirmField.classList.add("hidden");
            submitBtn.innerText = "লগইন করুন";
        } else if(mode === 'signup') {
            emailField.classList.remove("hidden"); avatarLabel.classList.remove("hidden"); confirmField.classList.add("hidden");
            submitBtn.innerText = "একাউন্ট তৈরি করুন";
        } else if(mode === 'forgot') {
            emailField.classList.remove("hidden"); avatarLabel.classList.add("hidden"); confirmField.classList.remove("hidden");
            submitBtn.innerText = "পাসওয়ার্ড পরিবর্তন করুন";
        }
    }

    // ফাইল রিডার ফাংশন (ছবি বা অডিওকে লোকাল টেক্সট ডাটায় রূপান্তর করার জন্য)
    function handleProfilePicSelect(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                base64AvatarString = e.target.result;
                document.getElementById("avatarLabel").innerText = "✅ ছবি সিলেক্ট হয়েছে!";
                document.getElementById("avatarLabel").style.borderColor = "#28a745";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // চ্যাটে সরাসরি ফোন থেকে ছবি সিলেক্ট করার পর যা হবে
    function handleChatImageSelect(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                sendMessage("image", e.target.result);
                input.value = ""; // রিসেট
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // চ্যাটে সরাসরি ফোন থেকে অডিও ফাইল সিলেক্ট করার পর যা হবে
    function handleChatAudioSelect(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                sendMessage("audio", e.target.result);
                input.value = ""; // রিসেট
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function handleAuthSubmit() {
        const username = document.getElementById('authUsername').value.trim().toLowerCase();
        const email = document.getElementById('authEmail').value.trim().toLowerCase();
        const password = document.getElementById('authPassword').value.trim();

        if(!username || !password) { alert("ইউজারনেম এবং পাসওয়ার্ড দিন।"); return; }

        if(authMode === "login") {
            const doc = await db.collection("users").doc(username).get();
            if (doc.exists && doc.data().password === password) loginSuccess(username);
            else alert("ভুল ইউজারনেম অথবা পাসওয়ার্ড!");
        } else if(authMode === "signup") {
            const userRef = db.collection("users").doc(username);
            if((await userRef.get()).exists) { alert("ইউজারনেমটি ইতিমধ্যে বুকড!"); return; }
            await userRef.set({ username, email, avatar: base64AvatarString, password, friends: [] });
            loginSuccess(username);
        }
    }

    function loginSuccess(username) {
        currentUser = username; localStorage.setItem("mhsms_user", username);
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        loadFriends(); listenForAllIncomingMessages();
    }

    function handleLogout() { localStorage.removeItem("mhsms_user"); location.reload(); }

    function loadFriends() {
        db.collection("users").doc(currentUser).onSnapshot((doc) => {
            const list = document.getElementById('friendList'); list.innerHTML = '';
            if(!doc.exists) return;
            (doc.data().friends || []).forEach(async (friend) => {
                const friendDoc = await db.collection("users").doc(friend).get();
                const friendData = friendDoc.data();
                const avatarUrl = friendData && friendData.avatar ? friendData.avatar : "";

                const li = document.createElement('li'); li.classList.add('friend-item');
                li.innerHTML = `
                    <div class="avatar" style="${avatarUrl ? `background-image:url('${avatarUrl}')` : ''}">${avatarUrl ? '' : friend.charAt(0)}</div>
                    <div class="chat-info">
                        <span class="chat-name">${friend}</span>
                        <span class="chat-preview">মেসেজ করতে ক্লিক করুন...</span>
                    </div>
                `;
                li.onclick = () => {
                    activeChatFriend = friend;
                    document.getElementById('currentChatUser').innerText = friend;
                    const winAvatar = document.getElementById('activeChatAvatar');
                    winAvatar.innerText = avatarUrl ? '' : friend.charAt(0);
                    winAvatar.style.backgroundImage = avatarUrl ? `url('${avatarUrl}')` : 'none';
                    document.getElementById('chatWindow').classList.add('open');
                    loadMessages();
                };
                list.appendChild(li);
            });
        });
    }

    function loadMessages() {
        if (unsubscribeChat) unsubscribeChat();
        let chatKey = [currentUser, activeChatFriend].sort().join('_');
        
        unsubscribeChat = db.collection("chats").doc(chatKey).collection("messages").orderBy("timestamp", "asc").onSnapshot(snapshot => {
            const area = document.getElementById('messageArea'); area.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const msgId = doc.id;
                
                const wrapper = document.createElement('div'); wrapper.classList.add('message-wrapper');
                const msgDiv = document.createElement('div'); msgDiv.classList.add('message', data.sender === currentUser ? 'outgoing' : 'incoming');
                msgDiv.setAttribute('data-id', msgId);

                if(data.replyToText) {
                    msgDiv.innerHTML += `<div class="reply-box-in-msg">💬 ${data.replyToText}</div>`;
                }

                if(data.type === "image") {
                    msgDiv.innerHTML += `<img class="msg-media" src="${data.text}">`;
                } else if(data.type === "audio") {
                    msgDiv.innerHTML += `<audio controls class="msg-audio" src="${data.text}"></audio>`;
                } else {
                    msgDiv.innerHTML += `<div>${data.text}</div>`;
                }

                if(data.sender === currentUser) {
                    msgDiv.onclick = () => handleMessageOptions(msgId, data.text, data.type);
                }

                setupSwipeToReply(msgDiv, data.type === 'text' ? data.text : `[${data.type} file]`);

                wrapper.appendChild(msgDiv); area.appendChild(wrapper);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function setupSwipeToReply(element, text) {
        let startX = 0; let currentX = 0; let isDragging = false;
        function onStart(e) { startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; isDragging = true; }
        function onMove(e) {
            if (!isDragging) return;
            currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let diffX = currentX - startX;
            if (diffX > 0 && diffX < 80) element.style.transform = `translateX(${diffX}px)`;
        }
        function onEnd() {
            if (!isDragging) return; isDragging = false;
            let diffX = currentX - startX; element.style.transform = "translateX(0px)";
            if (diffX > 50) triggerReply(element.getAttribute('data-id'), text);
            startX = 0; currentX = 0;
        }
        element.addEventListener('touchstart', onStart); element.addEventListener('touchmove', onMove); element.addEventListener('touchend', onEnd);
        element.addEventListener('mousedown', onStart);
    }

    function triggerReply(msgId, text) {
        selectedReplyMsgId = msgId;
        selectedReplyText = text.length > 30 ? text.substring(0, 30) + "..." : text;
        document.getElementById('replyPreviewText').innerText = `Replying to: "${selectedReplyText}"`;
        document.getElementById('replyPreviewBar').classList.remove('hidden');
    }

    function cancelReply() { selectedReplyMsgId = null; selectedReplyText = ""; document.getElementById('replyPreviewBar').classList.add('hidden'); }

    async function sendMessage(customType = "text", customValue = null) {
        const input = document.getElementById('messageInput');
        let text = customValue ? customValue : input.value.trim();
        if (!text) return;

        let chatKey = [currentUser, activeChatFriend].sort().join('_');
        let msgData = { sender: currentUser, text: text, type: customType, timestamp: new Date().getTime() };

        if(selectedReplyMsgId) { msgData.replyToId = selectedReplyMsgId; msgData.replyToText = selectedReplyText; }

        await db.collection("chats").doc(chatKey).collection("messages").add(msgData);
        input.value = ''; cancelReply();
    }

    async function handleMessageOptions(msgId, currentText, type) {
        let action = prompt("টাইপ করুন 'edit' সংশোধন করতে অথবা 'delete' মুছে ফেলতে:");
        let chatKey = [currentUser, activeChatFriend].sort().join('_');
        let docRef = db.collection("chats").doc(chatKey).collection("messages").doc(msgId);

        if(action === 'delete') {
            if(confirm("মেসেজটি মুছে ফেলতে চান?")) await docRef.delete();
        } else if(action === 'edit' && type === 'text') {
            let newText = prompt("মেসেজটি সংশোধন করুন:", currentText);
            if(newText) await docRef.update({ text: newText });
        }
    }

    function closeChatWindow() { document.getElementById('chatWindow').classList.remove('open'); if (unsubscribeChat) unsubscribeChat(); }
    async function addFriend() { const f = document.getElementById('friendUsername').value.trim().toLowerCase(); if(!f || f === currentUser) return; await db.collection("users").doc(currentUser).update({ friends: firebase.firestore.FieldValue.arrayUnion(f) }); await db.collection("users").doc(f).update({ friends: firebase.firestore.FieldValue.arrayUnion(currentUser) }); alert("যুক্ত হয়েছে!"); document.getElementById('friendUsername').value = ''; }
    function listenForAllIncomingMessages() { db.collectionGroup("messages").orderBy("timestamp", "desc").limit(1).onSnapshot(snapshot => { if (isInitialLoad) { isInitialLoad = false; return; } snapshot.docChanges().forEach(change => { if (change.type === "added" && change.doc.data().sender !== currentUser) { document.getElementById('smsRingtone').play().catch(e => {}); } }); }); }
</script>
</body>
</html>
