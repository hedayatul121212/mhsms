<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHSMS - কল নোটিফিকেশন ও রিংটোন সহ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 1000px; height: 85vh; background: rgba(255, 255, 255, 0.9); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; overflow: hidden; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); position: relative; }
        
        /* Notice Board */
        .notice-board { position: absolute; top: 0; left: 0; width: 100%; background: #ff4d6d; color: white; padding: 10px 20px; font-weight: bold; text-align: center; z-index: 100; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .notice-board button { background: none; border: none; color: white; font-weight: bold; cursor: pointer; }

        /* Incoming Call Overlay */
        .call-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .call-avatar { width: 100px; height: 100px; border-radius: 50%; background: #ff4d6d; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 77, 109, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); } }
        .call-btns { display: flex; gap: 40px; margin-top: 30px; }
        .call-btn { padding: 15px 30px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .accept-btn { background: #28a745; color: white; }
        .decline-btn { background: #dc3545; color: white; }

        /* Auth Screen */
        .auth-container { width: 100%; max-width: 400px; background: white; padding: 30px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 2px solid #ffb7b2; z-index: 10; }
        .auth-container h2 { margin-bottom: 20px; color: #ff6b6b; font-size: 1.8rem; }
        .google-btn { width: 100%; padding: 12px; background: #fff; color: #444; border: 1px solid #ccc; border-radius: 25px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Sidebar & Chat Area */
        .sidebar { width: 30%; border-right: 1px solid #ffe5ec; display: flex; flex-direction: column; background: #fff5f7; padding-top: 40px; }
        .sidebar-header { padding: 15px; background: linear-gradient(45deg, #ff758c, #ff7eb3); color: white; font-weight: bold; text-align: center; }
        .friend-list { flex: 1; overflow-y: auto; list-style: none; }
        .friend-item { padding: 12px; border-bottom: 1px solid #ffe5ec; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .friend-item.active { background: #ffccd5; }
        .call-icon-btn { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 0.8rem; }

        .chat-area { width: 70%; display: flex; flex-direction: column; background: #fffbfb; padding-top: 40px; }
        .chat-header { padding: 12px 15px; background: #fff0f3; border-bottom: 1px solid #ffe5ec; display: flex; justify-content: space-between; align-items: center; }
        .message-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message-container { display: flex; align-items: center; width: 100%; gap: 8px; }
        .message { padding: 12px 16px; border-radius: 20px; max-width: 65%; word-wrap: break-word; }
        .message.incoming { background: #f1f3f5; }
        .message.outgoing { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; }
        
        .input-area { display: flex; padding: 15px; background: #fff0f3; }
        .input-area input { flex: 1; padding: 12px 20px; border: 1px solid #ffccd5; border-radius: 30px; outline: none; }
        .input-area button { background: linear-gradient(45deg, #ff758c, #ff7eb3); color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 30px; cursor: pointer; }

        .admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="incomingCallScreen" class="call-overlay hidden">
    <div class="call-avatar" id="callerAvatar">📞</div>
    <h2 id="callerName">কেউ একজন কল দিচ্ছে...</h2>
    <p style="color: #ccc; margin-top: 10px;">MHSMS Voice Call</p>
    <div class="call-btns">
        <button class="call-btn accept-btn" onclick="answerCall()">রিসিভ করুন ✅</button>
        <button class="call-btn decline-btn" onclick="declineCall()">কেটে দিন ❌</button>
    </div>
</div>

<div id="noticeBoard" class="notice-board hidden">
    <span id="noticeText">📢 নোটিশ...</span>
    <button onclick="closeNotice()">✕</button>
</div>

<div id="authScreen" class="auth-container">
    <h2>MHSMS-এ স্বাগতম 🌸</h2>
    <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">আপনার জিমেইল অ্যাকাউন্ট দিয়ে লগইন করুন।</p>
    <button id="loginBtn" class="google-btn" onclick="handleGoogleAuth()">
        <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_web_24dp.png" alt="Google" width="20">
        Gmail দিয়ে প্রবেশ করুন
    </button>
</div>

<div id="appScreen" class="app-container hidden">
    <div class="sidebar">
        <div class="sidebar-header">MHSMS চ্যাট</div>
        <ul class="friend-list" id="friendList"></ul>
        <div style="padding: 10px; background: #fff; text-align: center;">
            <button id="adminPanelBtn" style="padding:10px; background:#333; color:white; border:none; border-radius:20px; font-weight:bold; cursor:pointer;" class="hidden" onclick="openAdminPanel()">Admin Panel 🛠️</button>
            <button style="width:100%; padding:8px; background:#dc3545; color:white; border:none; border-radius:20px; font-weight:bold; cursor:pointer; margin-top:5px;" onclick="handleLogout()">লগআউট 🚪</button>
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-header">
            <div id="currentChatUser" style="font-weight:bold; color:#ff4d6d;">কোনো বন্ধু সিলেক্ট করুন</div>
        </div>
        <div class="message-area" id="messageArea"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="মেসেজ লিখুন..." autocomplete="off">
            <button onclick="sendMessage()">পাঠান</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1p-aoUP7QUEFqGCL5j7YE5RWnV7Uwd0A",
        authDomain: "hedayatul-4487e.firebaseapp.com",
        projectId: "hedayatul-4487e",
        storageBucket: "hedayatul-4487e.firebasestorage.app",
        messagingSenderId: "120479258973",
        appId: "1:120479258973:web:3280d2794466b1537030b4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUser = null, currentUserEmail = null, activeChatFriend = null, unsubscribeChat = null;
    const ADMIN_EMAIL = "hedayatuli31@gmail.com"; 

    // রিংটোন প্লেয়ার সেটআপ (এখানে আপনার রিংটোনের ডিরেক্ট MP3 লিংক বসাতে পারেন)
    const ringtone = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
    ringtone.loop = true; 

    window.onload = function() {
        // ব্রাউজারে নোটিফিকেশন পারমিশন চাওয়া
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        const hash = window.location.hash;
        if (hash) {
            const params = new URLSearchParams(hash.substring(1));
            const idToken = params.get('id_token');
            if (idToken) {
                const credential = firebase.auth.GoogleAuthProvider.credential(idToken);
                auth.signInWithCredential(credential).then(result => {
                    history.replaceState(null, null, ' ');
                    loginSuccess(result.user);
                });
                return;
            }
        }

        const localEmail = localStorage.getItem("mhsms_logged_email");
        if (localEmail) {
            fastLoginSuccess(localStorage.getItem("mhsms_logged_name"), localEmail, localStorage.getItem("mhsms_logged_avatar"));
        }
        listenForGlobalNotice();
    };

    function handleGoogleAuth() {
        const currentUrl = window.location.href.split('#')[0].split('?')[0];
        const clientId = "120479258973-7bqtunh7020oev10v51l789l7aonjgn3.apps.googleusercontent.com";
        window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${encodeURIComponent(currentUrl)}&response_type=id_token&scope=openid%20profile%20email&nonce=mhsmsnonce&prompt=select_account`;
    }

    function loginSuccess(user) {
        localStorage.setItem("mhsms_logged_email", user.email);
        localStorage.setItem("mhsms_logged_name", user.displayName || user.email.split('@')[0]);
        localStorage.setItem("mhsms_logged_avatar", user.photoURL || "");
        fastLoginSuccess(user.displayName, user.email, user.photoURL);
    }

    function fastLoginSuccess(name, email, avatar) {
        currentUser = name; currentUserEmail = email;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        if (currentUserEmail === ADMIN_EMAIL) document.getElementById('adminPanelBtn').classList.remove('hidden');
        
        db.collection("users").doc(currentUserEmail).set({
            username: currentUser, email: currentUserEmail, avatar: avatar, lastActive: Date.now(), isOnline: true
        }, { merge: true });

        loadFriends();
        listenForIncomingCalls(); // ইনকামিং কল লিসেনার চালু
    }

    // কাউকে কল দেওয়ার ফাংশন
    async function startCall(friendEmail, friendName) {
        alert(friendName + "-কে কল দেওয়া হচ্ছে...");
        await db.collection("calls").doc(friendEmail).set({
            callerName: currentUser,
            callerEmail: currentUserEmail,
            status: "ringing",
            timestamp: Date.now()
        });
    }

    // ইনকামিং কল এবং রিংটোন লিসেনার
    function listenForIncomingCalls() {
        db.collection("calls").doc(currentUserEmail).onSnapshot(doc => {
            if (doc.exists) {
                const callData = doc.data();
                if (callData.status === "ringing") {
                    // ১. স্ক্রিনে কলিং পপআপ দেখানো
                    document.getElementById("callerName").innerText = `${callData.callerName} আপনাকে কল দিচ্ছেন...`;
                    document.getElementById("incomingCallScreen").classList.remove("hidden");
                    
                    // ২. রিংটোন বাজানো
                    ringtone.play().catch(e => console.log("অডিও প্লে করতে ইউজারের ইন্টারঅ্যাকশন লাগবে।"));

                    // ৩. পুশ নোটিফিকেশন পাঠানো (যদি অ্যাপ ব্যাকগ্রাউন্ডে থাকে)
                    if (Notification.permission === "granted") {
                        new Notification("MHSMS Incoming Call", {
                            body: `${callData.callerName} ইজ কলিং ইউ...`,
                            icon: "https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_web_24dp.png"
                        });
                    }
                } else if (callData.status === "ended") {
                    stopRingtoneAndClose();
                }
            }
        });
    }

    function answerCall() {
        ringtone.pause();
        alert("কল রিসিভ হয়েছে! (ভিডিও/অডিও স্ট্রিম এখানে যুক্ত হবে)");
        db.collection("calls").doc(currentUserEmail).delete();
        document.getElementById("incomingCallScreen").classList.add("hidden");
    }

    async function declineCall() {
        stopRingtoneAndClose();
        await db.collection("calls").doc(currentUserEmail).set({ status: "ended" }, { merge: true });
        setTimeout(() => { db.collection("calls").doc(currentUserEmail).delete(); }, 2000);
    }

    function stopRingtoneAndClose() {
        ringtone.pause();
        ringtone.currentTime = 0;
        document.getElementById("incomingCallScreen").classList.add("hidden");
    }

    // ফ্রেন্ড লিস্ট লোড এবং কল বাটন যুক্ত করা
    function loadFriends() {
        db.collection("users").onSnapshot(snapshot => {
            const list = document.getElementById('friendList'); list.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data(); if (data.email === currentUserEmail) return;
                
                const li = document.createElement('li'); li.classList.add('friend-item');
                li.innerHTML = `
                    <span>🌸 ${data.username}</span>
                    <button class="call-icon-btn" onclick="event.stopPropagation(); startCall('${data.email}', '${data.username}')">📞 কল</button>
                `;
                li.onclick = () => {
                    activeChatFriend = data.email;
                    document.getElementById('currentChatUser').innerText = `চ্যাট উইথ: ${data.username}`;
                    loadMessages();
                };
                list.appendChild(li);
            });
        });
    }

    function loadMessages() {
        if (unsubscribeChat) unsubscribeChat();
        const chatId = [currentUserEmail, activeChatFriend].sort().join('_');
        unsubscribeChat = db.collection("chats").doc(chatId).collection("messages").orderBy("timestamp", "asc").onSnapshot(snapshot => {
            const area = document.getElementById('messageArea'); area.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data(); const isOwn = data.sender === currentUserEmail;
                const container = document.createElement('div'); container.classList.add('message-container');
                container.style.justifyContent = isOwn ? 'flex-end' : 'flex-start';
                const msgDiv = document.createElement('div'); msgDiv.classList.add('message', isOwn?'outgoing':'incoming');
                msgDiv.innerText = data.text;
                container.appendChild(msgDiv); area.appendChild(container);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput'); const text = input.value.trim(); if (!text || !activeChatFriend) return;
        const chatId = [currentUserEmail, activeChatFriend].sort().join('_');
        await db.collection("chats").doc(chatId).collection("messages").add({ sender: currentUserEmail, text, timestamp: Date.now() });
        input.value = '';
    }

    function listenForGlobalNotice() {
        db.collection("settings").doc("announcement").onSnapshot(doc => {
            if (doc.exists && doc.data().active) {
                document.getElementById('noticeText').innerText = "📢 " + doc.data().text;
                document.getElementById('noticeBoard').classList.remove('hidden');
            } else { document.getElementById('noticeBoard').classList.add('hidden'); }
        });
    }
    function closeNotice() { document.getElementById('noticeBoard').classList.add('hidden'); }
    async function handleLogout() { localStorage.clear(); auth.signOut(); location.reload(); }
    document.getElementById('messageInput').addEventListener('keypress', e => e.key === 'Enter' && sendMessage());
</script>
</body>
</html>
